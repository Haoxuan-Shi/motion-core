name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --config Release
      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure
      - name: Install export smoke test
        run: cmake --install build --config Release --prefix install
      - name: Configure installed-package consumer
        run: cmake -S tests/install_consumer -B consumer-build -DCMAKE_PREFIX_PATH="${{ github.workspace }}/install"
      - name: Build installed-package consumer
        run: cmake --build consumer-build --config Release
